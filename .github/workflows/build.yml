name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: Parse Nix files
        run: git ls-files '*.nix' -z | xargs -0 -n1 nix-instantiate --parse >/dev/null
      - name: Check flake metadata
        run: nix flake metadata --accept-flake-config --no-write-lock-file --json >/dev/null
      - name: Evaluate flake checks without building
        run: nix flake check --accept-flake-config --no-write-lock-file --no-build
